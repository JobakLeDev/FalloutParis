<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg?v=e0a48636">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Paris — Quêtes</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../common/style.css?v=60a9c208">
  <link rel="stylesheet" href="quetes.css?v=1c6b2991">
  <link rel="stylesheet" href="../../common/zoom.css?v=2a2cfe92">
</head>
<body>

  <!-- HEADER -->
  <div class="qhdr">
    <div class="qhdr-title">📋 QUÊTES &amp; OBJECTIFS<small id="qhdr-mode">Vue joueur</small></div>
    <div class="qhdr-btns">
      <button class="qbtn" id="qmj-btn" onclick="demanderMJ()">🔑 Mode MJ</button>
      <button class="qbtn" id="qadd-btn" onclick="addQuete()" style="display:none">+ Nouvelle quête</button>
      <button class="qbtn" id="qimport-btn" onclick="importDesignQuests()" style="display:none" title="Importe/actualise les quêtes depuis data/quetes.json (met à jour le contenu des quêtes existantes, conserve révélations/XP/statut)">⬇ Importer / Actualiser (quetes.json)</button>
      <button class="qbtn" id="qcollapse-btn" onclick="collapseAllQuests()" style="display:none">▸ Tout réduire</button>
      <button class="qbtn" id="qexpand-btn" onclick="expandAllQuests()" style="display:none">▾ Tout développer</button>
      <a class="qbtn" href="../mj/mj.html">🎲 MJ</a>
      <a class="qbtn" href="../carte/carte.html">🗺 Carte</a>
      <a class="qbtn" href="../journal/journal.html">📖 Journal</a>
      <a class="qbtn" href="../encyclopedie/encyclopedie.html">📚 Encyclo.</a>
      <a class="qbtn" href="../admin_perso/admin_perso.html">⚙ Admin</a>
      <a class="qbtn" href="../../index.html">Accueil</a>
    </div>
  </div>

  <!-- FILTRE STATUT -->
  <div id="q-filters">
    <button class="q-filter on" data-f="all" onclick="setFilter('all')">Toutes</button>
    <button class="q-filter" data-f="active" onclick="setFilter('active')">En cours</button>
    <button class="q-filter" data-f="done" onclick="setFilter('done')">Terminées</button>
    <button class="q-filter" data-f="failed" onclick="setFilter('failed')">Échouées</button>
  </div>

  <!-- FILTRE TYPE (MJ uniquement) -->
  <div id="q-typefilters" style="display:none">
    <button class="q-filter q-tf on" data-tf="all" onclick="setTypeFilter('all')">Tous types</button>
    <button class="q-filter q-tf" data-tf="principale" onclick="setTypeFilter('principale')">Principales</button>
    <button class="q-filter q-tf" data-tf="annexe" onclick="setTypeFilter('annexe')">Annexes</button>
  </div>

  <div id="quetes-list"><div class="q-empty">Chargement…</div></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../common/shared.js?v=9d7d9c39"></script>
  <script src="quetes.js?v=898568cb"></script>
  <script src="../../common/responsive.js?v=f2bdcb93"></script>
</body>
</html>
