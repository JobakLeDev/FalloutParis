<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg?v=e0a48636">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fallout Paris — Nouveau personnage</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="../../common/style.css?v=60a9c208">
  <link rel="stylesheet" href="creation_perso.css?v=eb5bd6c8">
  <link rel="stylesheet" href="../../common/zoom.css?v=2a2cfe92">
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="../../img/VaultBoy.png" class="vb" alt="">
    <div class="title">NOUVEAU PERSONNAGE</div>
    <div class="subtitle">Fallout Online Play</div>
  </div>
  <div class="panel">
    <div class="ptitle">Informations de connexion</div>
    <div class="field">
      <label>Identifiant unique</label>
      <input type="text" id="f-id" placeholder="ex: alice, marcus..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="this.value=this.value.toLowerCase().replace(/\s/g,'')">
      <div class="hint">Utilisé pour te connecter · sans espace · en minuscules</div>
    </div>
    <div class="field">
      <label>Code de connexion (4 chiffres)</label>
      <input type="password" id="f-code" placeholder="••••" maxlength="4" inputmode="numeric">
      <div class="hint">Retiens-le bien, il ne peut pas être récupéré</div>
    </div>
  </div>
  <div class="panel">
    <div class="ptitle">Ton personnage</div>
    <div class="field">
      <label>Nom du personnage</label>
      <input type="text" id="f-nom" placeholder="ex: Alice, Marcus Aurelius...">
    </div>
  </div>
  <div class="panel">
    <div class="ptitle">Qui suis-je ?</div>
    <div id="quest-progress" class="quest-progress"></div>
    <div id="quest-stage" class="quest-stage"></div>
  </div>
  <button class="btn" onclick="creer()">⟶ Créer mon personnage</button>
  <button class="btn-back" onclick="window.location.href='../../index.html'">← Retour</button>
  <div class="msg" id="msg"></div>
</div>
  <script src="../../common/shared.js?v=9d7d9c39"></script>
  <script src="../../common/db.js?v=7f69fad0"></script>
  <script src="creation_perso.js?v=8d07e31d"></script>
  <script src="../../common/theme.js?v=613766fd"></script>
  <script src="../../common/responsive.js?v=f2bdcb93"></script>
</body>
</html>
