<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Paris — Combat</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../common/style.css">
  <link rel="stylesheet" href="combat.css">
</head>
<body>

<!-- LOCK -->
<div class="lock" id="lock">
  <div class="lock-box">
    <div class="lock-title">⚔ COMBAT MJ</div>
    <input type="password" class="lock-input" id="lock-inp" placeholder="••••" maxlength="4" inputmode="numeric">
    <button class="lock-btn" onclick="unlock()">ENTRER</button>
    <div class="lock-err" id="lock-err">Code incorrect</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="hdr">
    <div><div class="hdr-title">⚔ ÉCRAN DE COMBAT<small>Fallout Paris — MJ</small></div></div>
    <div class="hdr-btns">
      <a class="hbtn" href="mj.html">← MJ</a>
      <a class="hbtn" href="../../index.html">Accueil</a>
    </div>
  </div>

  <!-- COL 1 : JOUEURS -->
  <div class="pnl" style="overflow-y:auto;max-height:calc(100vh - 80px)">
    <div class="pnl-title">Joueurs</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="sel-joueurs-bar" id="sel-joueurs"></div>
      <button class="init-btn" onclick="lancerInitiative()">🎲 Initiative</button>
    </div>

    <div id="joueurs-combat"></div>
  </div>

  <!-- COL 2 : ENNEMIS -->
  <div class="pnl" style="overflow-y:auto;max-height:calc(100vh - 80px)">
    <div class="pnl-title">Ennemis</div>

    <div id="ennemis-combat"></div>

    <div class="add-ennemi">
      <div class="ae-title">+ Ajouter ennemi</div>
      <div class="ae-row"><span class="ae-lbl">Nom</span><input class="ae-inp" id="ennemi-nom" placeholder="Pillard..."></div>
      <div class="ae-row"><span class="ae-lbl">PV</span><input class="ae-inp" id="ennemi-pv" placeholder="2D+4" value="2D+4"></div>
      <div class="ae-row"><span class="ae-lbl">Atq</span><input class="ae-inp" id="ennemi-atq" placeholder="3D" value="3D"></div>
      <div class="ae-row"><span class="ae-lbl">RD</span><input class="ae-inp" id="ennemi-rd" placeholder="0" value="0" type="number"></div>
      <button class="ae-btn" onclick="ajouterEnnemi()">+ Ajouter</button>
    </div>
  </div>

  <!-- COL 3 : DÉS + INITIATIVE + LOG -->
  <div style="display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 80px);overflow-y:auto">

    <!-- DÉS -->
    <div class="pnl">
      <div class="pnl-title">Jet de dés</div>
      <div id="dice-context" style="min-height:40px;margin-bottom:8px;padding:6px;background:#060d06;border:1px solid var(--b);font-size:9px;color:var(--td)">
        Sélectionne un joueur pour voir ses conditions de succès
      </div>
      <div class="tn-row">
        <span class="tn-lbl">TN</span>
        <input type="number" class="tn-inp" id="tn-val" value="10" min="1" max="20">
        <button class="dice-btn" onclick="lancer2D20()">2D20</button>
      </div>
      <div class="dice-result" id="dice-result">—</div>
      <div class="cd-row">
        <span class="tn-lbl" style="font-size:7px;color:var(--td)">DC</span>
        <input type="number" class="cd-inp" id="nb-cd" value="2" min="1" max="10">
        <button class="cd-btn" onclick="lancerCD()">Dés Combat</button>
      </div>
      <div class="dice-result" id="cd-result" style="margin-top:4px">—</div>
    </div>

    <!-- INITIATIVE -->
    <div class="pnl">
      <div class="pnl-title">Ordre d'initiative</div>
      <div class="init-list" id="initiative-list">
        <span style="font-size:9px;color:var(--td)">Lance l'initiative d'abord</span>
      </div>
    </div>

    <!-- LOG -->
    <div class="pnl" style="flex:1">
      <div class="pnl-title">
        Journal de combat
        <button class="log-clear" onclick="clearLog()">Effacer</button>
      </div>
      <div class="scr" id="combat-log"></div>
    </div>

  </div>

</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="combat.js"></script>
</body>
</html>
