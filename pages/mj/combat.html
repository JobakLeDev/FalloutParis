<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Paris — Combat</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../common/style.css">
  <link rel="stylesheet" href="combat.css">
</head>
<body>

<!-- APP -->
<div id="app">

  <!-- HEADER hors grid -->
  <div class="hdr">
    <div><div class="hdr-title">⚔ ÉCRAN DE COMBAT<small>Fallout Paris — MJ</small></div></div>
    <div class="hdr-btns">
      <a class="hbtn" href="mj.html">← MJ</a>
      <a class="hbtn" href="../../index.html">Accueil</a>
    </div>
  </div>

  <!-- GRILLE 3 colonnes -->
  <div class="combat-grid">

    <!-- COL 1 : JOUEURS -->
    <div class="pnl">
      <div class="pnl-title">
        Joueurs
        <button class="init-btn" onclick="lancerInitiative()">🎲 Initiative</button>
      </div>
      <div class="sel-bar" id="sel-joueurs"></div>
      <div id="joueurs-combat"></div>
    </div>

    <!-- COL 2 : ENNEMIS -->
    <div class="pnl">
      <div class="pnl-title">
        Ennemis
        <button class="add-ennemi-btn" onclick="ouvrirModalEnnemi()">+ Ajouter</button>
      </div>
      <div id="ennemis-combat"></div>
    </div>

    <!-- COL 3 : DÉS + INITIATIVE + LOG -->
    <div style="display:flex;flex-direction:column;gap:8px">

      <div class="pnl">
        <div class="pnl-title">Jet de dés</div>
        <div id="dice-context" style="padding:5px;background:#060d06;border:1px solid var(--b);margin-bottom:6px;min-height:36px">
          <span class="empty">Sélectionne un joueur puis une arme</span>
        </div>
        <div class="tn-row">
          <span class="tn-lbl">TN</span>
          <input type="number" class="tn-inp" id="tn-val" value="10" min="1" max="20">
          <button class="dice-btn" onclick="lancer2D20()">2D20</button>
        </div>
        <div class="dice-result" id="dice-result">—</div>
        <div class="cd-row">
          <span class="tn-lbl">DC</span>
          <input type="number" class="cd-inp" id="nb-cd" value="2" min="1" max="10">
          <button class="cd-btn" onclick="lancerCD()">Dés Combat</button>
        </div>
        <div class="dice-result" id="cd-result" style="margin-top:4px">—</div>
      </div>

      <div class="pnl">
        <div class="pnl-title">Tracker de tour</div>
        <div id="tracker-tour"><span class="empty">Lance l'initiative pour démarrer</span></div>
      </div>

      <div class="pnl">
        <div class="pnl-title">
          Journal
          <button class="log-clear" onclick="clearLog()">Effacer</button>
        </div>
        <div class="scr" id="combat-log"></div>
      </div>

    </div>

  </div><!-- /combat-grid -->

</div><!-- /app -->

<!-- MODAL ENNEMI -->
<div class="mo" id="mo-ennemi" style="display:none">
  <div class="mbox">
    <div class="mtitle">Ajouter ennemi</div>
    <div class="mf">
      <label>Ennemi</label>
      <select id="mo-ennemi-nom"></select>
    </div>
    <div class="mf">
      <label>Nombre</label>
      <input type="number" id="mo-ennemi-nb" value="1" min="1" max="10">
    </div>
    <div class="mf">
      <label>Niveau (1-5)</label>
      <input type="number" id="mo-ennemi-lvl" value="1" min="1" max="5">
    </div>
    <div class="mbtns">
      <button class="mbtn ok" onclick="ajouterEnnemisModal()">Ajouter</button>
      <button class="mbtn cancel" onclick="fermerModalEnnemi()">Annuler</button>
    </div>
  </div>
</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../common/shared.js"></script>
  <script src="mj_shared.js"></script>
  <script src="combat_sync.js"></script>
  <script src="combat.js"></script>
  <script>document.addEventListener("DOMContentLoaded", init);</script>
</body>
</html>
