<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Paris — Combat</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../common/style.css">
  <link rel="stylesheet" href="combat.css">
  <link rel="stylesheet" href="combat_joueur.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div><div class="hdr-title">⚔ COMBAT<small id="hdr-nom">Fallout Paris</small></div></div>
    <div class="hdr-btns">
      <span id="hdr-round" style="font-size:9px;color:var(--am);letter-spacing:2px"></span>
      <a class="hbtn" id="lien-fiche" href="#">↗ Ma fiche</a>
    </div>
  </div>

  <!-- ATTENTE -->
  <div id="attente" style="text-align:center;padding:40px;color:var(--td);font-size:10px;letter-spacing:2px">
    En attente du début du combat...<br>
    <span style="font-size:8px;opacity:0.5;margin-top:8px;display:block">Cette page se met à jour automatiquement</span>
  </div>

  <!-- COMBAT ACTIF -->
  <div id="combat-actif" style="display:none">

    <!-- GRILLE PRINCIPALE : fiche+coéq | ennemis | initiative -->
    <div class="cj-grid">

      <!-- COL GAUCHE : ma fiche + coéquipiers empilés -->
      <div class="col-gauche">
        <div class="pnl" id="ma-carte">
          <div class="pnl-title">Ma fiche</div>
          <div id="ma-carte-content"><span class="empty">Chargement...</span></div>
        </div>
        <div class="pnl" style="margin-top:8px">
          <div class="pnl-title">Alliés</div>
          <div id="j-coequipiers"><span class="empty">Aucun coéquipier</span></div>
        </div>
      </div>

      <!-- COL MILIEU : ennemis -->
      <div class="col-milieu">
        <div class="pnl" style="height:100%">
          <div class="pnl-title">Ennemis</div>
          <div id="j-ennemis"><span class="empty">Aucun ennemi</span></div>
        </div>
      </div>

      <!-- COL DROITE : initiative -->
      <div class="col-droite">
        <div class="pnl" style="height:100%">
          <div class="pnl-title">Initiative · R<span id="j-round">?</span></div>
          <div id="j-tracker"><span class="empty">En attente...</span></div>
        </div>
      </div>

    </div>

    <!-- BARRE DU BAS : actions + dés -->
    <div class="cj-bottom">

      <!-- ACTIONS -->
      <div class="pnl bottom-actions">
        <div class="pnl-title">Mes actions</div>
        <div id="j-actions"><span class="empty">—</span></div>
      </div>

      <!-- AP GROUPE -->
      <div class="pnl bottom-ap">
        <div class="pnl-title">AP Groupe</div>
        <div class="j-ap-pool">
          <div class="j-ap-dots" id="j-ap-dots"></div>
          <span class="j-ap-val" id="j-ap-val">0</span><span style="font-size:7px;color:var(--td)">/6</span>
        </div>
        <div id="j-ap-spend-btns"></div>
      </div>

      <!-- DÉS -->
      <div class="pnl bottom-des">
        <div class="pnl-title">Mes jets</div>
        <div class="des-inner">
          <div id="mes-des-context" class="des-ctx">Sélectionne une arme</div>
          <div class="j-d20-sel">
            <button class="j-d20-btn on" id="j-d20-2" onclick="setNbDiceJ(2)">2D20</button>
            <button class="j-d20-btn" id="j-d20-3" onclick="setNbDiceJ(3)">3D −1AP</button>
            <button class="j-d20-btn" id="j-d20-4" onclick="setNbDiceJ(4)">4D −3AP</button>
            <button class="j-d20-btn" id="j-d20-5" onclick="setNbDiceJ(5)">5D −6AP</button>
          </div>
          <div class="des-cols">
            <div class="des-col">
              <div class="des-row">
                <span class="tn-lbl">TN</span>
                <input type="number" class="tn-inp" id="j-tn-val" value="10" min="1" max="20">
                <button class="dice-btn" id="j-lance-btn" onclick="jLancer2D20()">2D20</button>
              </div>
              <div class="dice-result sm" id="j-dice-result">—</div>
              <div id="j-convert-ap" style="display:none;margin-top:3px"></div>
            </div>
            <div class="des-col">
              <div class="des-row">
                <span class="tn-lbl">DC</span>
                <input type="number" class="cd-inp" id="j-nb-cd" value="2" min="1" max="10">
                <button class="cd-btn" onclick="jLancerCD()">CD</button>
              </div>
              <div class="dice-result sm" id="j-cd-result">—</div>
              <div id="j-bonus-dmg" style="display:none;margin-top:3px"></div>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../common/shared.js"></script>
  <script src="../../common/db.js"></script>
  <script src="mj_shared.js"></script>
  <script src="combat_joueur.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => window.DB_READY.then(initJoueur));</script>
</body>
</html>
