<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Paris — MJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../common/style.css">
  <link rel="stylesheet" href="mj.css">
</head>
<body>

<!-- LOCK -->
<div class="lock" id="lock">
  <div class="lock-box">
    <div class="lock-title">MAÎTRE DU JEU</div>
    <input type="password" class="lock-input" id="lock-inp" placeholder="••••" maxlength="4" inputmode="numeric">
    <button class="lock-btn" onclick="unlock()">ENTRER</button>
    <div class="lock-err" id="lock-err">Code incorrect</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- HEADER (full width) -->
  <div class="hdr">
    <div><div class="hdr-title">FALLOUT PARIS<small>ÉCRAN MAÎTRE DU JEU</small></div></div>
    <div class="hdr-btns">
      <button class="hbtn" onclick="location.reload()">↻ Rafraîchir</button>
      <a class="hbtn" href="../admin_perso/admin_perso.html">⚙ Admin persos</a>
      <a class="hbtn" href="../../index.html">← Accueil</a>
    </div>
  </div>

  <!-- COLONNE GAUCHE -->
  <div class="col-left">

    <!-- SÉLECTION -->
    <div class="sel-bar">
      <span class="sel-lbl">SÉLECTION :</span>
      <button class="sel-btn" onclick="selTous()">Tous</button>
      <button class="sel-btn" onclick="selAucun()">Aucun</button>
      <span class="sel-count">Sélectionnés : <span id="sel-count">0</span></span>
    </div>

    <!-- JOUEURS -->
    <div class="joueurs-grid" id="joueurs-grid">
      <div style="font-size:9px;color:var(--td);padding:20px">Chargement...</div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-pnl">
      <div class="pnl-title">Actions rapides — joueurs sélectionnés</div>
      <div class="actions-grid">

        <div class="action-group">
          <div class="action-group-title">⚔ Combat</div>
          <div class="action-row">
            <input type="number" class="action-input" id="val-dmg" value="1" min="1">
            <button class="action-btn dmg" onclick="appliquer('dmg')">Infliger dégâts</button>
          </div>
          <div class="action-row">
            <input type="number" class="action-input" id="val-heal" value="1" min="1">
            <button class="action-btn heal" onclick="appliquer('heal')">Soigner</button>
          </div>
          <div class="action-row">
            <button class="action-btn heal full" onclick="appliquer('fullheal')">✚ Soin complet</button>
          </div>
        </div>

        <div class="action-group">
          <div class="action-group-title">☢ Radiation</div>
          <div class="action-row">
            <input type="number" class="action-input" id="val-rad" value="1" min="1">
            <button class="action-btn dmg" onclick="appliquer('rad')">Irradier</button>
          </div>
          <div class="action-row">
            <input type="number" class="action-input" id="val-derad" value="4" min="1">
            <button class="action-btn heal" onclick="appliquer('derad')">Soigner rad</button>
          </div>
          <div class="action-row">
            <button class="action-btn full" onclick="appliquer('derad-full')">Retirer toute rad</button>
          </div>
        </div>

        <div class="action-group">
          <div class="action-group-title">★ Expérience</div>
          <div class="action-row">
            <input type="number" class="action-input" id="val-xp" value="100" min="1">
            <button class="action-btn xp" onclick="appliquer('xp')">Donner XP</button>
          </div>
          <div class="action-row">
            <button class="action-btn xp full" onclick="appliquer('xp-500')">+500 XP</button>
          </div>
          <div class="action-row">
            <button class="action-btn xp full" onclick="appliquer('xp-1000')">+1000 XP</button>
          </div>
        </div>

        <div class="action-group">
          <div class="action-group-title">⛺ Repos</div>
          <div class="action-row">
            <button class="action-btn heal full" onclick="appliquer('repos-court')">Repos court (+END PV)</button>
          </div>
          <div class="action-row">
            <button class="action-btn heal full" onclick="appliquer('repos-long')">Repos long (PV max)</button>
          </div>
          <div class="action-row">
            <button class="action-btn full" onclick="appliquer('reset-wounds')">Effacer blessures</button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- COLONNE DROITE -->
  <div class="col-right">
    <div class="rencontre-pnl">
      <div class="pnl-title">Rencontres & Déplacements</div>

      <div class="rencontre-controls">
        <div class="ctrl-row">
          <span class="ctrl-lbl">Zone</span>
          <select class="ctrl-sel" id="zone-sel">
            <option>Paris Centre</option>
            <option>Paris Banlieue</option>
            <option>Métro</option>
            <option>Zone Industrielle</option>
            <option>Égouts</option>
            <option>Zone Verte</option>
          </select>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-lbl">Ennemis</span>
          <input type="number" class="ctrl-input" id="nb-ennemis" value="3" min="1" max="10">
        </div>
        <div class="ctrl-row">
          <span class="ctrl-lbl">Unités dépl.</span>
          <input type="number" class="ctrl-input" id="nb-unites" value="1" min="1" max="20">
        </div>
      </div>

      <div class="gen-btns">
        <button class="gen-btn" onclick="genCombat()">⚔ Générer combat</button>
        <button class="gen-btn dep" onclick="genDeplacement()">🚶 Déplacement</button>
      </div>

      <div id="rencontre-panel"></div>
    </div>
  </div>

</div>

<div class="msg-bar" id="msg-bar"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="mj.js"></script>
</body>
</html>
