<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Paris — Carte</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../../common/style.css">
  <link rel="stylesheet" href="carte.css">
</head>
<body>

  <!-- HEADER -->
  <div class="hdr">
    <div><div class="hdr-title">🗺 CARTE — PARIS<small id="hdr-mode">Vue joueur</small></div></div>
    <div class="hdr-btns">
      <button class="hbtn" id="mj-btn" onclick="demanderMJ()">🔑 Mode MJ</button>
      <button class="hbtn" id="edit-btn" onclick="toggleEdit()" style="display:none">✎ Édition</button>
      <a class="hbtn" href="../mj/mj.html">← MJ</a>
      <a class="hbtn" href="../../index.html">Accueil</a>
    </div>
  </div>

  <!-- ONGLETS DE CARTE -->
  <div id="map-tabs">
    <button class="map-tab on" onclick="switchMapTab('paris')">🗺 PARIS</button>
    <button class="map-tab" onclick="switchMapTab('metro')">🚇 MÉTRO</button>
    <button class="map-tab" onclick="switchMapTab('lieux')">🏛 LIEUX</button>
  </div>

  <!-- ONGLET PARIS -->
  <div id="map-paris-wrap">
    <div id="map"></div>
  </div>

  <!-- ONGLET MÉTRO -->
  <div id="map-metro-wrap" style="display:none">
    <div id="map-metro"></div>
  </div>

  <!-- ONGLET LIEUX -->
  <div id="map-lieux-wrap" style="display:none">
    <div id="lieux-sidebar">
      <div class="mjp-title">Lieux</div>
      <div id="lieux-list"><span class="empty">Aucun lieu configuré</span></div>
    </div>
    <div id="map-lieux"></div>
    <div id="lieux-placeholder">
      <span>Sélectionne un lieu dans la liste</span>
      <small>Les plans de bâtiments apparaîtront ici</small>
    </div>
  </div>

  <!-- BANDEAU GAUCHE : outils MJ -->
  <div id="mj-left" style="display:none">
    <div class="mjp-section">
      <div class="mjp-title">Outils</div>
      <button class="mjp-btn" id="btn-ping" onclick="togglePingMode()">🚩 Ping joueurs</button>
    </div>
    <div class="mjp-section" id="mjp-tools" style="display:none">
      <div class="mjp-title">Édition</div>
      <div id="mjp-paris-tools">
        <button class="mjp-btn" id="btn-add-poi" onclick="toggleAddPOI()">📍 Ajouter POI</button>
        <button class="mjp-btn" id="btn-draw-zone" onclick="toggleDrawZone()">▱ Dessiner zone</button>
        <button class="mjp-btn" onclick="placerJetons()">⊕ Placer jetons</button>
      </div>
      <div id="mjp-lieux-tools" style="display:none">
        <button class="mjp-btn" onclick="ajouterLieu()">🏛 Ajouter un lieu</button>
      </div>
      <div id="draw-actions" style="display:none;margin-top:5px">
        <button class="mjp-btn ok" onclick="finishDrawZone()">✓ Terminer</button>
        <button class="mjp-btn cancel" onclick="cancelDrawZone()">✗ Annuler</button>
      </div>
    </div>
    <div class="mjp-hint" id="mjp-hint"></div>
    <div id="move-result"></div>
  </div>

  <!-- BANDEAU DROITE : positions des joueurs -->
  <div id="mj-right" style="display:none">
    <div class="mjp-section">
      <div class="mjp-title">Position des joueurs</div>
      <div id="player-zones"><span class="empty">…</span></div>
    </div>
  </div>

  <!-- FORMULAIRE DE ZONE (MJ) -->
  <div id="zone-form">
    <div class="zform-box">
      <div class="zform-title">Caractéristiques de la zone</div>
      <label>Nom</label>
      <input id="zf-name" type="text" placeholder="Nom de la zone…">
      <label>Pool de base (type de zone)</label>
      <select id="zf-base"></select>
      <label>Faction occupante</label>
      <select id="zf-occ"></select>
      <label>Variation</label>
      <select id="zf-var"></select>
      <label>Niveau de menace</label>
      <select id="zf-threat"></select>
      <div class="zform-btns">
        <button class="zf-ok" onclick="submitZoneForm()">✓ Enregistrer</button>
        <button class="zf-cancel" onclick="closeZoneForm()">✗ Annuler</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../../common/shared.js"></script>
  <script src="../../common/db.js"></script>
  <script src="carte.js"></script>
</body>
</html>
