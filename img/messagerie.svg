<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- scanlines CRT -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.28"/>
    </pattern>
    <clipPath id="panel">
      <rect x="3" y="3" width="58" height="58" rx="10"/>
    </clipPath>
  </defs>

  <!-- panneau -->
  <rect x="3" y="3" width="58" height="58" rx="10" fill="#0c150c" stroke="#7ed87e" stroke-width="3"/>

  <g clip-path="url(#panel)">
    <!-- combiné téléphonique (en diagonale, coin haut-gauche) -->
    <g transform="translate(7 6) rotate(-8 16 16)">
      <path fill="#7ed87e" d="M6.6 4.2c1.7 0 3.3.3 4.8.8.5.2.8.7.7 1.2l-.9 4.2c-.1.4-.4.8-.9.9l-2.7.7c1 2.1 2.7 3.8 4.8 4.8l.7-2.7c.1-.5.5-.8.9-.9l4.2-.9c.5-.1 1 .2 1.2.7.5 1.5.8 3.1.8 4.8 0 .9-.7 1.6-1.6 1.6C11 25.2 1.8 16 1.8 4.6 1.8 3.7 2.5 3 3.4 3l3.2 1.2z" transform="scale(1.25)"/>
    </g>

    <!-- clavier (pavé de touches, bas-droite) -->
    <g fill="#7ed87e">
      <rect x="34" y="30" width="7" height="4.4" rx="2.2"/>
      <rect x="44" y="30" width="7" height="4.4" rx="2.2"/>
      <rect x="54" y="30" width="5" height="4.4" rx="2.2"/>
      <rect x="34" y="38" width="7" height="4.4" rx="2.2"/>
      <rect x="44" y="38" width="7" height="4.4" rx="2.2"/>
      <rect x="54" y="38" width="5" height="4.4" rx="2.2"/>
      <rect x="34" y="46" width="7" height="4.4" rx="2.2"/>
      <rect x="44" y="46" width="7" height="4.4" rx="2.2"/>
      <rect x="54" y="46" width="5" height="4.4" rx="2.2"/>
      <rect x="34" y="54" width="7" height="4" rx="2"/>
      <rect x="44" y="54" width="7" height="4" rx="2"/>
      <rect x="54" y="54" width="5" height="4" rx="2"/>
    </g>

    <!-- voile de scanlines par-dessus -->
    <rect x="3" y="3" width="58" height="58" fill="url(#scan)"/>
  </g>
</svg>
